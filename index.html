<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perdón 💔</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        background-color: #ffe6e6;
    }
    h1 {
        margin-top: 50px;
    }
    .btn {
        padding: 15px 25px;
        font-size: 18px;
        margin: 20px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
    }
    #si {
        background-color: #4CAF50;
        color: white;
    }
    #no {
        background-color: #f44336;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<h1>¿Me perdonas por mi manera de ser y de responder?</h1>

<button id="si" class="btn" onclick="respuesta()">Sí</button>
<button id="no" class="btn">No</button>

<h2 id="mensaje"></h2>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

function respuesta() {
    document.getElementById("mensaje").innerText = 
    "Gracias cielo, perdona mi forma de ser. En serio extraño mucho a Clyde y en serio te pido perdón por ser un novio con sentimientos tan débiles 💔";
}
</script>

</body>
</html>
